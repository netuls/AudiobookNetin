<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stark CSAT</title>
  <link rel="icon" type="image/webp" href="cardapinho.webp">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="root">
    <!-- Topbar -->
    <div class="topbar">
      <div class="brand">
        <div class="logo">
          <img src="cardapinho.webp" alt="Cardapinho" onerror="this.style.display='none'; this.parentElement.textContent='🍽️';">
        </div>
        <div>
          <div class="brand-name">STARK CSAT</div>
        </div>
      </div>
      <div style="display: flex; gap: 12px;">
        <button class="export-btn" id="export-btn">⬇ Exportar Excel</button>
        <button class="suggestion-btn" id="suggestion-btn" title="Sugerir melhoria">💡 Sugestão</button>
        <button class="view-suggestions-btn" id="view-suggestions-btn" title="Ver sugestões recebidas">📋 Ver Sugestões</button>
      </div>
    </div>
    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-n" id="ct-total">0</div>
        <div class="stat-l">Melhorias Registradas</div>
      </div>
    </div>
    <!-- Toolbar -->
    <div class="toolbar">
      <input class="search-input" id="search-input" type="text" placeholder="🔍  Buscar melhoria...">
      <select class="sort-select" id="member-select">
        <option value="">👤 Todos os membros</option>
        <option value="Victor">Victor</option>
        <option value="Leticia">Leticia</option>
        <option value="Neto">Neto</option>
        <option value="Ygaro">Ygaro</option>
        <option value="Joab">Joab</option>
      </select>
    </div>
    <!-- Conteúdo -->
    <div id="body"></div>
  </div>

  <!-- Modal de senha -->
  <div id="pw-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-icon">🔐</div>
      <div class="modal-title">Confirmar exclusão</div>
      <div class="modal-sub">Digite a senha para continuar</div>
      <input class="modal-input" id="modal-pw" type="password" placeholder="••••••••••••••" autocomplete="off">
      <div class="modal-error" id="modal-err"></div>
      <div class="modal-btns">
        <button class="modal-btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="modal-btn-confirm" onclick="confirmDelete()">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Modal de sugestão -->
  <div id="suggestion-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-icon">💡</div>
      <div class="modal-title">Sugerir Melhoria</div>
      <div class="modal-sub">Sua sugestão nos ajuda a melhorar!</div>
      <input class="modal-input" id="suggestion-name" type="text" placeholder="Seu nome" maxlength="50">
      <textarea class="modal-input suggestion-textarea" id="suggestion-text" placeholder="Descreva sua sugestão..." maxlength="500"></textarea>
      <div class="char-count">
        <span id="char-current">0</span>/500
      </div>
      <div class="modal-error" id="suggestion-err"></div>
      <div class="modal-btns">
        <button class="modal-btn-cancel" onclick="closeSuggestionModal()">Cancelar</button>
        <button class="modal-btn-confirm" onclick="submitSuggestion()">Enviar Sugestão</button>
      </div>
    </div>
  </div>

  <!-- Toast desfazer -->
  <div class="undo-toast" id="undo-toast">
    <span id="undo-label"></span>
    <button id="undo-btn">Desfazer</button>
    <button id="undo-close">✕</button>
  </div>

  <!-- Modal de senha para ver sugestões -->
  <div id="suggestions-pw-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-icon">🔐</div>
      <div class="modal-title">Acesso Restrito</div>
      <div class="modal-sub">Digite a senha para ver as sugestões</div>
      <input class="modal-input" id="suggestions-pw-input" type="password" placeholder="••••••••••••••" autocomplete="off"
             onkeydown="if(event.key==='Enter') confirmSuggestionsPassword()">
      <div class="modal-error" id="suggestions-pw-err"></div>
      <div class="modal-btns">
        <button class="modal-btn-cancel" onclick="closeSuggestionsPwModal()">Cancelar</button>
        <button class="modal-btn-confirm" onclick="confirmSuggestionsPassword()">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Painel de Sugestões -->
  <div id="suggestions-panel" class="modal-overlay" style="display:none;">
    <div class="modal-box suggestions-panel-box">
      <div class="modal-icon">📋</div>
      <div class="modal-title">Sugestões Recebidas</div>
      <div class="suggestions-panel-meta">
        <span class="suggestions-panel-count"><span id="suggestions-count">0</span> sugestão(ões)</span>
      </div>
      <div id="suggestions-list" class="suggestions-list"></div>
      <div class="modal-btns" style="margin-top:20px;">
        <button class="modal-btn-confirm" onclick="closeSuggestionsPanel()">Fechar</button>
      </div>
    </div>
  </div>

  <!-- SheetJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
