<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stark CSAT</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="root">

    <!-- Topbar -->
    <div class="topbar">
      <div class="brand">
        <div class="logo">
          <img src="assets/logo.png" alt="Squad Stark" onerror="this.style.display='none'; this.parentElement.textContent='🐺';">
        </div>
        <div>
          <div class="brand-name">STARK CSAT</div>
        </div>
      </div>
      <button class="export-btn" id="export-btn">⬇ Exportar Excel</button>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-n" id="ct-total">0</div>
        <div class="stat-l">Melhorias Registradas</div>
      </div>
    </div>

    <!-- Toolbar: busca + ordenação -->
    <div class="toolbar">
      <input class="search-input" id="search-input" type="text" placeholder="🔍  Buscar melhoria...">
      <select class="sort-select" id="sort-select">
        <option value="newest">Mais recentes</option>
        <option value="oldest">Mais antigas</option>
        <option value="alpha">Alfabética</option>
      </select>
    </div>

    <!-- Conteúdo -->
    <div id="body"></div>
  </div>

  <!-- Modal de senha -->
  <div id="pw-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-icon">🔐</div>
      <div class="modal-title">Confirmar exclusão</div>
      <div class="modal-sub">Digite a senha para continuar</div>
      <input class="modal-input" id="modal-pw" type="password" placeholder="••••••••••••••" autocomplete="off">
      <div class="modal-error" id="modal-err"></div>
      <div class="modal-btns">
        <button class="modal-btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="modal-btn-confirm" onclick="confirmDelete()">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Toast desfazer -->
  <div class="undo-toast" id="undo-toast">
    <span id="undo-label"></span>
    <button id="undo-btn">Desfazer</button>
    <button id="undo-close">✕</button>
  </div>

  <!-- SheetJS para exportar Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
