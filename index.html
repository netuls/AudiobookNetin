<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stark CSAT</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="root">
    <div class="topbar">
      <div class="brand">
        <div class="logo">
          <img src="assets/logo.png" alt="Squad Stark" onerror="this.style.display='none'; this.parentElement.textContent='🐺';">
        </div>
        <div>
          <div class="brand-name">STARK CSAT</div>
          <div class="brand-sub">Squad Intelligence System</div>
        </div>
      </div>
      <div class="status">
        <div class="status-dot"></div>
        <div class="status-text">SISTEMA ATIVO</div>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-n" id="ct-total">0</div>
        <div class="stat-l">Total</div>
      </div>
      <div class="stat">
        <div class="stat-n pend" id="ct-open">0</div>
        <div class="stat-l">Pendentes</div>
      </div>
      <div class="stat">
        <div class="stat-n conc" id="ct-done">0</div>
        <div class="stat-l">Concluídos</div>
      </div>
    </div>

    <div id="body"></div>
  </div>

  <script src="app.js"></script>

</body>
</html>
