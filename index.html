<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stark CSAT</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="root">
    <header class="topbar">
      <div class="brand">
        <div class="logo">
          <img src="cardapinho.webp" alt="Cardapinho" onerror="this.style.display='none'; this.parentElement.textContent='🍽️';">
        </div>
        <div>
          <h1 class="brand-name">STARK CSAT</h1>
        </div>
      </div>
      <button class="export-btn" id="export-btn">⬇ Exportar Excel</button>
    </header>

    <section class="stats-bar" aria-label="Estatísticas">
      <div class="stat">
        <div class="stat-n" id="ct-total">0</div>
        <div class="stat-l">Melhorias Registradas</div>
      </div>
    </section>

    <section class="toolbar" aria-label="Filtros e Busca">
      <input class="search-input" id="search-input" type="text" placeholder="🔍  Buscar melhoria..." aria-label="Buscar melhoria">
      <select class="sort-select" id="member-select" aria-label="Filtrar por membro">
        <option value="">👤 Todos os membros</option>
        <option value="Victor">Victor</option>
        <option value="Leticia">Leticia</option>
        <option value="Neto">Neto</option>
        <option value="Ygaro">Ygaro</option>
        <option value="Joab">Joab</option>
      </select>
    </section>

    <main id="body"></main>
  </div>

  <div id="pw-modal" class="modal-overlay" style="display:none;" role="dialog" aria-labelledby="modal-title" aria-modal="true">
    <div class="modal-box">
      <div class="modal-icon" aria-hidden="true">🔐</div>
      <div class="modal-title" id="modal-title">Confirmar exclusão</div>
      <div class="modal-sub">Digite a senha para continuar</div>
      <input class="modal-input" id="modal-pw" type="password" placeholder="••••••••••••••" autocomplete="off">
      <div class="modal-error" id="modal-err"></div>
      <div class="modal-btns">
        <button class="modal-btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="modal-btn-confirm" onclick="confirmDelete()">Confirmar</button>
      </div>
    </div>
  </div>

  <div class="undo-toast" id="undo-toast" role="alert" aria-live="assertive">
    <span id="undo-label"></span>
    <button id="undo-btn">Desfazer</button>
    <button id="undo-close" aria-label="Fechar notificação">✕</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
